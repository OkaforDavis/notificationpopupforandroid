<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F0F1A">
    <meta name="description" content="Premium Android Notification Popup System — beautiful in-app notifications for mobile web apps">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236C5CE7' width='100' height='100' rx='22'/><text x='50%25' y='54%25' font-size='60' fill='white' text-anchor='middle' dominant-baseline='central'>🔔</text></svg>">
    <title>NotifyPop — Android Notifications</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Header -->
        <header class="app-header">
            <div class="app-logo">🔔</div>
            <h1>NotifyPop</h1>
            <p>Android-style notification popups</p>
        </header>

        <!-- Permission Banner -->
        <div id="permissionBanner"></div>

        <!-- Notification Type Buttons -->
        <section class="section-card">
            <h2>Notification Types <span class="badge">Core</span></h2>
            <div class="btn-grid">
                <button class="btn btn-success" id="btnSuccess" onclick="sendNativeSuccess()">
                    <span class="btn-icon">✓</span>
                    Success
                </button>
                <button class="btn btn-error" id="btnError" onclick="sendNativeError()">
                    <span class="btn-icon">✕</span>
                    Error
                </button>
                <button class="btn btn-warning" id="btnWarning" onclick="sendNativeWarning()">
                    <span class="btn-icon">⚠</span>
                    Warning
                </button>
                <button class="btn btn-info" id="btnInfo" onclick="sendNativeInfo()">
                    <span class="btn-icon">ⓘ</span>
                    Info
                </button>
            </div>
        </section>

        <!-- Simulate Real Actions -->
        <section class="section-card">
            <h2>Simulate Actions <span class="badge">Demo</span></h2>

            <button class="btn btn-action" id="btnUpload" onclick="simulateUpload()">
                <span class="btn-icon">📤</span>
                <span class="btn-text">Upload File<span>Simulates file upload with progress</span></span>
            </button>

            <button class="btn btn-action" id="btnForm" onclick="simulateFormSubmit()">
                <span class="btn-icon">📋</span>
                <span class="btn-text">Submit Form<span>Simulates form submission</span></span>
            </button>

            <button class="btn btn-action" id="btnFetch" onclick="simulateDataFetch()">
                <span class="btn-icon">🔄</span>
                <span class="btn-text">Fetch Data<span>Simulates API data loading</span></span>
            </button>

            <button class="btn btn-action" id="btnGoal" onclick="simulateGameGoal()">
                <span class="btn-icon">⚽</span>
                <span class="btn-text">Goal Scored<span>SoccerScore-style live alert</span></span>
            </button>

            <button class="btn btn-action" id="btnBet" onclick="simulateBetting()">
                <span class="btn-icon">💰</span>
                <span class="btn-text">Bet Confirmed<span>BetApp-style wager confirmation</span></span>
            </button>

            <div class="progress-demo" id="progressDemo" style="display: none;">
                <p>Processing...</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <button class="btn-clear" id="btnClearAll" onclick="clearAllNotifications()">
                Clear All Notifications
            </button>
        </section>
    </div>

    <div id="notificationContainer" class="notification-container"></div>

    <script src="notification.js"></script>
    <script src="android-notification.js"></script>
    <script>
        // ===== INITIALIZATION =====
        window.addEventListener('load', () => {
            initializeNotifications();
            renderPermissionBanner();
        });

        // ===== PERMISSION MANAGEMENT =====
        function renderPermissionBanner() {
            const banner = document.getElementById('permissionBanner');
            const perm = AndroidNotification.getPermission();

            if (perm === 'granted') {
                banner.className = 'permission-banner granted';
                banner.innerHTML = '✓ &nbsp;Native notifications enabled';
                banner.onclick = null;
            } else if (perm === 'denied') {
                banner.className = 'permission-banner denied';
                banner.innerHTML = '✕ &nbsp;Notifications blocked — enable in browser settings';
                banner.onclick = null;
            } else if (perm === 'unsupported') {
                banner.className = 'permission-banner granted';
                banner.innerHTML = '✓ &nbsp;In-app popup notifications active';
                banner.onclick = null;
            } else {
                banner.className = 'permission-banner needs-permission';
                banner.innerHTML = '🔔 &nbsp;Tap to enable native notifications';
                banner.onclick = async () => {
                    const granted = await AndroidNotification.requestPermission();
                    renderPermissionBanner();
                    if (granted) {
                        AndroidNotification.success('Notifications Enabled ✓', 'You will now receive native Android notifications');
                    }
                };
            }
        }

        // ===== NOTIFICATION SENDERS =====
        function sendNativeSuccess() {
            AndroidNotification.success('Success! ✓', 'Your action completed successfully.');
        }

        function sendNativeError() {
            AndroidNotification.error('Error! ✕', 'Something went wrong. Please try again.');
        }

        function sendNativeWarning() {
            AndroidNotification.warning('Warning ⚠', 'Please review this carefully before proceeding.');
        }

        function sendNativeInfo() {
            AndroidNotification.info('Information ⓘ', 'This is just for your information.');
        }

        // ===== SIMULATIONS =====
        function simulateUpload() {
            const progressDemo = document.getElementById('progressDemo');
            const progressFill = document.getElementById('progressFill');
            progressDemo.style.display = 'block';
            progressFill.style.width = '0%';

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    progressFill.style.width = '100%';
                    setTimeout(() => { progressDemo.style.display = 'none'; }, 300);
                    AndroidNotification.success('Upload Complete ✓', 'Your file has been uploaded successfully.');
                }
                progressFill.style.width = progress + '%';
            }, 500);
        }

        function simulateFormSubmit() {
            const progressDemo = document.getElementById('progressDemo');
            progressDemo.style.display = 'block';
            setTimeout(() => {
                progressDemo.style.display = 'none';
                AndroidNotification.success('Form Submitted ✓', 'Your form has been submitted successfully.');
            }, 2000);
        }

        function simulateDataFetch() {
            const progressDemo = document.getElementById('progressDemo');
            progressDemo.style.display = 'block';
            setTimeout(() => {
                progressDemo.style.display = 'none';
                AndroidNotification.info('Data Loaded ✓', '247 records fetched from the server.');
            }, 1500);
        }

        function simulateGameGoal() {
            AndroidNotification.success('⚽ GOAL! Manchester United', 'Cristiano Ronaldo scored! 89\' — Score: 2-1');
        }

        function simulateBetting() {
            AndroidNotification.success('💰 Bet Confirmed', 'Wager: $50 | Odds: 2.5 | Potential Win: $125');
        }

        function clearAllNotifications() {
            AndroidNotification.closeAll();
        }
    </script>
</body>
</html>
